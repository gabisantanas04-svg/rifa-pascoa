<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa - Cesta de Páscoa</title>

<style>

body{
font-family: Arial;
background:#f7f7f7;
text-align:center;
}

h1{
color:#8B4513;
}

.grid{
display:grid;
grid-template-columns: repeat(10, 50px);
gap:8px;
justify-content:center;
margin:20px;
}

.number{
padding:10px;
background:#2ecc71;
color:white;
cursor:pointer;
border-radius:6px;
}

.number.selected{
background:#f39c12;
}

.number.sold{
background:#e74c3c;
cursor:not-allowed;
}

form{
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
background:#8B4513;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🍫 Rifa Cesta de Páscoa</h1>

<p>Escolha seus números - R$10 cada</p>

<div class="grid" id="numbers"></div>

<h2>Números escolhidos:</h2>

<p id="selected"></p>

<h2>Seus dados</h2>

<form id="form">

<input required placeholder="Nome"><br><br>

<input required placeholder="Telefone"><br><br>

<input required placeholder="Endereço"><br><br>

<select id="cidade" required>

<option value="">Selecione sua cidade</option>

<option>Recife</option>
<option>Olinda</option>
<option>Paulista</option>
<option>Jaboatão dos Guararapes</option>

</select>

<br><br>

<button type="submit">Gerar pagamento Pix</button>

</form>

<div id="pix"></div>

<script>

const grid = document.getElementById("numbers")

const selectedDisplay = document.getElementById("selected")

let selected = []

let sold = JSON.parse(localStorage.getItem("soldNumbers")) || []

for(let i=1;i<=100;i++){

let div=document.createElement("div")

div.className="number"

div.innerText=i

if(sold.includes(i)){
div.classList.add("sold")
}

div.onclick=()=>{

if(div.classList.contains("sold")) return

if(selected.includes(i)){
selected=selected.filter(n=>n!=i)
div.classList.remove("selected")
}else{
selected.push(i)
div.classList.add("selected")
}

selectedDisplay.innerText=selected.join(", ")

}

grid.appendChild(div)

}

document.getElementById("form").onsubmit=function(e){

e.preventDefault()

let cidade=document.getElementById("cidade").value

if(cidade===""){
alert("Selecione uma cidade válida.")
return
}

if(selected.length===0){
alert("Escolha pelo menos um número.")
return
}

let total=selected.length*10

document.getElementById("pix").innerHTML=

`
<h2>Pagamento Pix</h2>

<p>Valor: R$ ${total}</p>

<p>Chave Pix:</p>

<b>gabi.santana.s04@gmail.com</b>

<p>Depois de pagar envie o comprovante:</p>

<a href="https://wa.me/5581988451455?text=Olá!%20Acabei%20de%20comprar%20um%20número%20da%20rifa%20Cesta%20de%20Páscoa.%20Segue%20meu%20comprovante." target="_blank">

<button>Enviar comprovante pelo WhatsApp</button>

</a>

<p>Números reservados: ${selected.join(", ")}</p>

`

sold=[...sold,...selected]

localStorage.setItem("soldNumbers",JSON.stringify(sold))

}

</script>

</body>

</html>
